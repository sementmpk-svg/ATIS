  .bg-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
  }
  .title-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    flex: 1;
    justify-content: center;
    gap: 2px;
    padding-top: 40px;
  }
  .title-why {
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--white);
    line-height: 0.85;
    font-size: clamp(72px, 20vw, 130px);
    letter-spacing: -0.02em;
    text-align: center;
  }
  .title-not {
    font-family: 'Bodoni Moda', serif;
    font-style: normal;
    font-weight: 400;
    color: var(--accent);
    line-height: 0.85;
    font-size: clamp(72px, 20vw, 130px);
    letter-spacing: -0.02em;
    text-align: center;
  }
  .bottom {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    width: 100%;
    padding: 0 24px;
  }
  .choose-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    line-height: 2;
  }
  .lang-btns {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }
  .lang-btn {
    flex: 1;
    font-family: 'Bodoni Moda', serif;
    font-size: 19px;
    font-weight: 400;
    font-style: italic;
    color: var(--white);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.13);
    padding: 16px 10px 14px;
